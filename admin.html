<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель керування | THE 1M GRID</title>
    <style>
        /* Основні налаштування */
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Стильна картка */
        .card {
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #30363d;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #27ae60;
        }

        h2 {
            margin-top: 0;
            color: #27ae60;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Вибір кольору */
        input[type="color"] {
            width: 100%;
            height: 60px;
            border: 2px solid #30363d;
            border-radius: 10px;
            background: none;
            cursor: pointer;
            margin-bottom: 25px;
            transition: border-color 0.3s;
        }

        input[type="color"]:hover {
            border-color: #27ae60;
        }

        /* Кнопка Зберегти */
        .btn-save {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.5);
            transform: scale(1.02);
        }

        /* Блок контактів */
        .contact-group {
            margin-top: 35px;
            width: 100%;
            max-width: 380px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #21262d;
            color: #27ae60;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 12px;
            border: 1px solid #30363d;
            transition: all 0.2s ease;
        }

        .contact-btn:hover {
            background: #30363d;
            color: #2ecc71;
            border-color: #2ecc71;
        }

        .contact-btn span {
            margin-right: 10px;
            font-size: 20px;
        }

        /* Посилання назад */
        .back-link {
            margin-top: 25px;
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Налаштування</h2>
        <p style="color: #8b949e; margin-bottom: 20px;">Оберіть колір для сітки:</p>
        
        <input type="color" id="colorPicker" value="#27ae60">
        
        <button class="btn-save" onclick="saveData()">ЗБЕРЕГТИ ЗМІНИ</button>
    </div>

    <div class="contact-group">
        <!-- Кнопка Telegram -->
        <a href="https://t.me" target="_blank" class="contact-btn">
            <span>📩</span> Написати Адміну
        </a>

        <!-- Кнопка Телефон -->
        <a href="tel:+380991222371" class="contact-btn">
            <span>📞</span> Зателефонувати
        </a>
    </div>

    <a href="index.html" class="back-link">⬅ Повернутися до пікселів</a>

    <script>
        function saveData() {
            const color = document.getElementById('colorPicker').value;
            alert('Колір ' + color + ' збережено! Бажаєте перейти до оплати?');
            // Тут можна додати логіку збереження в базу або перехід
        }
    </script>

</body>
</html>
