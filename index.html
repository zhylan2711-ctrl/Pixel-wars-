<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background-color: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
            background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 26px; font-weight: bold; color: #27ae60; text-shadow: 0 0 15px #27ae60; text-transform: uppercase; }
        
        .pixel-wall { display: grid; grid-template-columns: repeat(3, 110px); gap: 15px; padding: 15px; background: rgba(0, 0, 0, 0.5); border: 2px solid #333; border-radius: 5px; }
        
        .p-zone {
            width: 110px; height: 110px; background: #161b22; border: 1px solid #30363d;
            background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px);
            background-size: 5px 5px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; color: #444;
        }

        /* СУПЕР-ЗУМ ПРИ НАВЕДЕННІ */
        .p-zone:hover { transform: scale(3); z-index: 1000; background-color: #fff; color: #000; border: 1px solid #27ae60; box-shadow: 0 0 40px rgba(39, 174, 96, 0.8); }
        .p-zone img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
        
        .price-badge { position: absolute; bottom: 4px; right: 4px; background: #27ae60; color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* ВІКНО ДОПИСУ (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; text-align: center; max-width: 280px; border: 4px solid #27ae60; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .btn-pay { display: block; margin-top: 20px; padding: 15px; background: #e74c3c; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
        
        .rules-box { margin-top: 40px; padding: 20px; max-width: 350px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid #27ae60; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">The 1M Grid ⚔️</div>
        <p style="font-size: 11px; color: #555;">Тисни на піксель, щоб побачити допис власника</p>
    </div>

    <div class="pixel-wall">
        <!-- ТУТ ТИ БУДЕШ МІНЯТИ ДОПИСИ (openModal) ТА КАРТИНКИ (img) -->
        <div class="p-zone" onclick="openModal('Піксель #1', 'Цей піксель вільний! Ціна $1. Після покупки тут буде ваш допис.', 'https://privat24.ua')">#1<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #2', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#2<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #3', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#3<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #4', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#4<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #5', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#5<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #6', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#6<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #7', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#7<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #8', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#8<span class="price-badge">$1</span></div>
        <div class="p-zone" onclick="openModal('Піксель #9', 'Вільний за $1 (44 грн).', 'https://privat24.ua')">#9<span class="price-badge">$1</span></div>
    </div>

    <div class="rules-box">
        <b>📜 ПРАВИЛА:</b><br>
        1. Ціна вільного місця: <b>$1 (44 грн)</b>.<br>
        2. Перекуп: <b>+$1</b> до поточної ціни.<br>
        3. Максимум <b>9 пікселів</b> в одні руки.<br><br>
        <a href="https://t.me" target="_blank" style="color: #27ae60; font-weight: bold; text-decoration: none;">📩 НАПИСАТИ АДМІНУ (БАНЕР / ДОПИС)</a>
    </div>

    <div id="m" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="mt">Піксель</h2>
            <p id="mtx" style="margin: 15px 0; font-size: 14px; line-height: 1.4;"></p>
            <a id="ml" href="#" target="_blank" class="btn-pay">ОПЛАТИТИ / ПЕРЕЙТИ</a>
        </div>
    </div>

    <script>
        function openModal(id, txt, link) {
            document.getElementById('mt').innerText = id;
            document.getElementById('mtx').innerText = txt;
            document.getElementById('ml').href = link;
            document.getElementById('m').style.display = 'flex';
        }
        function closeModal() { document.getElementById('m').style.display = 'none'; }
    </script>
</body>
</html>
